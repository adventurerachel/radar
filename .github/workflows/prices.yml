#
# Daily price tracker workflow.
#
# Purpose:
# - Runs the retail price monitoring process daily.
# - Records historical prices.
# - Persists price history back to the repository.
#
# Required repository secrets:
# - PUSHOVER_API_TOKEN
# - PUSHOVER_USER_KEY
#

name: Run price tracker

on:
  # Run every day at 07:00 UTC.
  schedule:
    - cron: "0 7 * * *"

  # Allow manual execution from the Actions UI.
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prices:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run price tracker
        env:
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: uv run python price_main.py

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add storage/history/*.jsonl

          git diff --staged --quiet || git commit -m "Update price history"

          git push